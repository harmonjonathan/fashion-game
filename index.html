<!DOCTYPE html>
<html>
<head>
  <title>Mason's Fashion Dress-Up Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: pink;
      text-align: center;
    }

    .game {
      background: white;
      width: 350px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 20px;
    }

    .girl {
      font-size: 80px;
      margin: 20px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: hotpink;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: deeppink;
    }
  </style>
</head>
<body>

  <div class="game">
    <h1>Mason's Fashion Game</h1>

    <div class="girl">
      <div id="hair">💇‍♀️</div>
      <div id="dress">👗</div>
      <div id="shoes">👠</div>
    </div>

    <h2>Hair Designs</h2>
    <button onclick="changeHair('💇‍♀️')">Cute Hair</button>
    <button onclick="changeHair('👱‍♀️')">Blonde Hair</button>
    <button onclick="changeHair('👩‍🦱')">Curly Hair</button>

    <h2>Dresses</h2>
    <button onclick="changeDress('👗')">Pink Dress</button>
    <button onclick="changeDress('🥻')">Fancy Outfit</button>
    <button onclick="changeDress('🧥')">Jacket Look</button>

    <h2>Shoes</h2>
    <button onclick="changeShoes('👠')">Heels</button>
    <button onclick="changeShoes('👟')">Sneakers</button>
    <button onclick="changeShoes('🥿')">Flats</button>

    <br><br>
    <button onclick="randomStyle()">Random Style</button>
  </div>

  <script>
    function changeHair(style) {
      document.getElementById("hair").textContent = style;
    }

    function changeDress(style) {
      document.getElementById("dress").textContent = style;
    }

    function changeShoes(style) {
      document.getElementById("shoes").textContent = style;
    }

    function randomStyle() {
      const hairs = ["💇‍♀️", "👱‍♀️", "👩‍🦱"];
      const dresses = ["👗", "🥻", "🧥"];
      const shoes = ["👠", "👟", "🥿"];

      changeHair(hairs[Math.floor(Math.random() * hairs.length)]);
      changeDress(dresses[Math.floor(Math.random() * dresses.length)]);
      changeShoes(shoes[Math.floor(Math.random() * shoes.length)]);
    }
  </script>

</body>
</html>
